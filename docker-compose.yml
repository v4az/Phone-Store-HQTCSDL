services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: csdl-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Pass123"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
      - ./database/migrations:/migrations:z

volumes:
  sqlserver-data:
